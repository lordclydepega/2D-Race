<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Race: Pro Circuit</title>
    <style>
        body { 
            margin: 0; 
            background: #0a0a0a; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }
        #container { 
            position: relative; 
            width: 95vw; 
            max-width: 1200px; 
            aspect-ratio: 12 / 8; 
            border: 6px solid #333; 
            background: #2d5a27;
        }
        canvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>

<div id="container">
    <canvas id="raceCanvas" width="1200" height="800"></canvas>
</div>

<script>
    class Car {
        constructor() {
            this.x = 400;
            this.y = 700;
            this.angle = 0;
            this.speed = 0;
        }

        update(keys) {
            // Acceleration & Braking logic
            if (keys['ArrowUp']) this.speed += 0.15;
            if (keys['ArrowDown']) this.speed -= 0.12;

            // Steering logic (only functional when the car is moving)
            if (Math.abs(this.speed) > 0.1) {
                let dir = this.speed > 0 ? 1 : -1;
                if (keys['ArrowLeft']) this.angle -= 0.05 * dir;
                if (keys['ArrowRight']) this.angle += 0.05 * dir;
            }

            // Standard air/rolling resistance (friction)
            this.speed *= 0.97;

            // Update position based on velocity and angle
            this.x += Math.cos(this.angle) * this.speed;
            this.y += Math.sin(this.angle) * this.speed;
        }

        draw(ctx) {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);
            
            // Draw a temporary red rectangle to represent the car
            ctx.fillStyle = "#e60000";
            ctx.fillRect(-20, -12, 40, 24);
            ctx.restore();
        }
    }

    class RaceGame {
        constructor() {
            this.canvas = document.getElementById('raceCanvas');
            this.ctx = this.canvas.getContext('2d');
            this.car = new Car();
            this.keys = {};

            // Listen for keydown and keyup to handle multiple simultaneous presses
            window.addEventListener('keydown', e => this.keys[e.code] = true);
            window.addEventListener('keyup', e => this.keys[e.code] = false);

            this.loop();
        }

        loop() {
            // Logic Update
            this.car.update(this.keys);

            // Clear the frame and draw car at new position
            this.ctx.fillStyle = "#2d5a27";
            this.ctx.fillRect(0, 0, 1200, 800);
            this.car.draw(this.ctx);
            
            requestAnimationFrame(() => this.loop());
        }
    }

    // Initialize the game instance
    const game = new RaceGame();
</script>
</body>
</html>
