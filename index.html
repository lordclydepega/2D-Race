<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D RACE</title>
    <style>
        body { 
            margin: 0; background: #0a0a0a; color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden; 
        }
        #container { 
            position: relative; background: #2d5a27; border: 6px solid #333; 
            border-radius: 15px; box-shadow: 0 0 50px rgba(0,0,0,0.8); 
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        canvas { width: 100%; height: 100%; display: block; }
        
        .ui { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center; 
            justify-content: center; background: rgba(0,0,0,0.85); z-index: 30; 
            text-align: center;
        }
        .active { display: flex; }

        .hud { 
            position: absolute; top: 5%; width: 100%; display: none; 
            justify-content: space-around; font-weight: bold; 
            font-size: clamp(1rem, 3vw, 1.8rem); text-shadow: 2px 2px #000; 
            pointer-events: none; z-index: 10; color: #ffd700; 
            font-family: 'Courier New', Courier, monospace; 
        }

        h1 { font-size: clamp(3rem, 8vw, 5rem); color: #ffd700; margin: 0; letter-spacing: 5px; }
        h2 { font-size: 2.2rem; color: #fff; margin: 10px 0; }
        .result-text { font-size: 1.2rem; color: #aaa; margin-bottom: 20px; }

        .btn-group { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; width: 280px; }
        
        button { 
            padding: 15px; font-size: 1.1rem; background: #ffd700; border: none; 
            cursor: pointer; font-weight: bold; border-radius: 8px; 
            text-transform: uppercase; transition: 0.3s; color: #000; 
        }
        button:hover { background: #fff; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255,215,0,0.4); }
        button.secondary { background: #333; color: white; border: 1px solid #555; }
    </style>
</head>
<body>

<div id="container">
    <div class="hud" id="gameHud">
        <div>LAP: <span id="lapCount">1</span>/3</div>
        <div>TIME: <span id="timer">0.00</span></div>
        <div>BEST: <span id="best">--</span></div>
    </div>

    <div id="menu" class="ui active">
        <h1>2D RACE</h1>
        <div class="btn-group">
            <button onclick="game.start()">Start Race</button>
            <button class="secondary" onclick="game.showScoreboard()">View Scores</button>
            <button class="secondary" onclick="alert('Please close the tab to exit.')">Exit</button>
        </div>
    </div>

    <div id="scoreboard" class="ui">
        <h1>TOP SCORES</h1>
        <div id="scoreList" style="margin: 20px 0; font-size: 1.5rem; line-height: 2;"></div>
        <div class="btn-group">
            <button class="secondary" onclick="game.showMenu()">Back to Menu</button>
        </div>
    </div>

    <div id="results" class="ui">
        <h1>FINISH!</h1>
        <h2 id="finalTime">0.00s</h2>
        <div class="btn-group">
            <button onclick="game.start()">Race Again</button>
            <button class="secondary" onclick="location.reload()">Main Menu</button>
        </div>
    </div>

    <canvas id="raceCanvas" width="1200" height="800"></canvas>
</div>

<script>
    const TRACK_POINTS = [
        {x: 200, y: 700}, {x: 1000, y: 700}, {x: 1100, y: 600}, {x: 1100, y: 400}, 
        {x: 900, y: 300}, {x: 700, y: 500}, {x: 500, y: 300}, {x: 700, y: 100}, 
        {x: 300, y: 100}, {x: 100, y: 300}, {x: 100, y: 600}   
    ];

    class Obstacle {
        constructor(x, y) { this.x = x; this.y = y; }
        draw(ctx) {
            ctx.save(); ctx.translate(this.x, this.y);
            // Shaded Base
            ctx.fillStyle = "#a34100"; ctx.fillRect(-12, 8, 24, 4);
            // Main Cone Body
            ctx.fillStyle = "#ff6600"; ctx.beginPath(); 
            ctx.moveTo(-10, 8); ctx.lineTo(10, 8); ctx.lineTo(0, -18); ctx.fill();
            // Reflective Stripe (Detail)
            ctx.fillStyle = "white"; ctx.fillRect(-4, -4, 8, 5); 
            ctx.restore();
        }
    }

    class Car {
        constructor() { this.reset(); }
        reset() { this.x = 400; this.y = 700; this.angle = 0; this.speed = 0; }
        update(keys, onGrass, collision) {
            if (collision) this.speed *= -0.5;
            if (keys['ArrowUp']) this.speed += 0.15;
            if (keys['ArrowDown']) this.speed -= 0.12;
            if (Math.abs(this.speed) > 0.1) {
                let dir = this.speed > 0 ? 1 : -1;
                if (keys['ArrowLeft']) this.angle -= 0.05 * dir;
                if (keys['ArrowRight']) this.angle += 0.05 * dir;
            }
            this.speed *= (onGrass ? 0.85 : 0.97);
            this.x += Math.cos(this.angle) * this.speed;
            this.y += Math.sin(this.angle) * this.speed;
        }
        draw(ctx) {
            ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
            // Main Car Body
            ctx.fillStyle = "#e60000"; ctx.fillRect(-22, -12, 44, 24);
            // Windshield and Roof
            ctx.fillStyle = "#1a1a1a"; ctx.fillRect(-5, -10, 15, 20); 
            ctx.fillStyle = "#333"; ctx.fillRect(2, -8, 6, 16); 
            // Headlights
            ctx.fillStyle = "#fff"; ctx.fillRect(18, -10, 4, 6); ctx.fillRect(18, 4, 4, 6);
            // Spoiler
            ctx.fillStyle = "#000"; ctx.fillRect(-24, -12, 4, 24);
            ctx.restore();
        }
    }

    class RaceGame {
        constructor() {
            this.canvas = document.getElementById('raceCanvas');
            this.ctx = this.canvas.getContext('2d');
            this.car = new Car(); this.obstacles = []; this.keys = {}; this.state = 'MENU';
            this.bestTime = localStorage.getItem('raceBestTime') || null;
            this.updateBestDisplay();
            window.addEventListener('resize', () => this.resize());
            window.addEventListener('keydown', e => this.keys[e.code] = true);
            window.addEventListener('keyup', e => this.keys[e.code] = false);
            this.resize(); this.loop();
        }

        resize() {
            const container = document.getElementById('container');
            const padding = 40;
            let width = window.innerWidth - padding;
            let height = (width * 800) / 1200;
            if (height > window.innerHeight - padding) {
                height = window.innerHeight - padding;
                width = (height * 1200) / 800;
            }
            container.style.width = width + 'px'; container.style.height = height + 'px';
        }

        updateBestDisplay() {
            document.getElementById('best').innerText = this.bestTime ? `${this.bestTime}s` : "--";
        }

        showMenu() {
            this.state = 'MENU';
            document.querySelectorAll('.ui').forEach(el => el.classList.remove('active'));
            document.getElementById('menu').classList.add('active');
            document.getElementById('gameHud').style.display = 'none';
        }

        showScoreboard() {
            const scoreList = document.getElementById('scoreList');
            const best = localStorage.getItem('raceBestTime');
            scoreList.innerHTML = best 
                ? `<div style="color: #ffd700;">1. PERSONAL BEST: ${best}s</div>`
                : "No scores recorded yet!";
            document.getElementById('menu').classList.remove('active');
            document.getElementById('scoreboard').classList.add('active');
        }

        start() {
            this.state = 'PLAYING'; this.currentLap = 1; this.hasHitCheckpoint = false;
            this.car.reset(); this.startTime = Date.now(); this.generateObstacles();
            document.querySelectorAll('.ui').forEach(el => el.classList.remove('active'));
            document.getElementById('gameHud').style.display = 'flex';
            document.getElementById('lapCount').innerText = "1";
        }

        finishRace() {
            this.state = 'FINISHED';
            const finalTime = parseFloat(((Date.now() - this.startTime) / 1000).toFixed(2));
            if (!this.bestTime || finalTime < this.bestTime) {
                this.bestTime = finalTime;
                localStorage.setItem('raceBestTime', finalTime);
                this.updateBestDisplay();
            }
            document.getElementById('gameHud').style.display = 'none';
            document.getElementById('results').classList.add('active');
            document.getElementById('finalTime').innerText = `${finalTime}s`;
        }

        generateObstacles() {
            this.obstacles = []; this.drawTrack();
            for(let i=0; i<25; i++) {
                let tx = Math.random()*1200, ty = Math.random()*800;
                const p = this.ctx.getImageData(tx, ty, 1, 1).data;
                if (p[0] === 68 && Math.sqrt((tx-400)**2 + (ty-700)**2) > 200) {
                    this.obstacles.push(new Obstacle(tx, ty));
                }
            }
        }

        drawTrack() {
            const c = this.ctx;
            c.fillStyle = "#2d5a27"; c.fillRect(0, 0, 1200, 800);
            const renderCircuit = (width, color, dash = []) => {
                c.strokeStyle = color; c.lineWidth = width;
                c.setLineDash(dash); c.lineJoin = "round"; c.lineCap = "round";
                c.beginPath(); c.moveTo(TRACK_POINTS[0].x, TRACK_POINTS[0].y);
                for(let i=1; i<TRACK_POINTS.length; i++) c.lineTo(TRACK_POINTS[i].x, TRACK_POINTS[i].y);
                c.closePath(); c.stroke();
            };
            renderCircuit(150, "#ccc"); renderCircuit(140, "#900", [20, 20]);
            renderCircuit(130, "#444"); renderCircuit(2, "rgba(255,255,255,0.2)", [30, 30]);
            c.setLineDash([]); c.fillStyle = "white"; c.fillRect(390, 635, 15, 130);
        }

        loop() {
            this.drawTrack();
            if (this.state === 'PLAYING') {
                const p = this.ctx.getImageData(this.car.x, this.car.y, 1, 1).data;
                const onGrass = (p[1] > 80 && p[0] < 60);
                let collision = false;
                for(let o of this.obstacles) {
                    if (Math.sqrt((this.car.x - o.x)**2 + (this.car.y - o.y)**2) < 25) collision = true;
                }
                this.car.update(this.keys, onGrass, collision);
                if (this.car.x > 450 && this.car.x < 750 && this.car.y < 150) this.hasHitCheckpoint = true;
                if (this.car.x > 380 && this.car.x < 420 && this.car.y > 630 && this.hasHitCheckpoint) {
                    if (this.currentLap < 3) {
                        this.currentLap++; this.hasHitCheckpoint = false;
                        document.getElementById('lapCount').innerText = this.currentLap;
                    } else { this.finishRace(); }
                }
                document.getElementById('timer').innerText = ((Date.now() - this.startTime) / 1000).toFixed(2);
            }
            this.obstacles.forEach(o => o.draw(this.ctx)); this.car.draw(this.ctx);
            requestAnimationFrame(() => this.loop());
        }
    }
    const game = new RaceGame();
</script>
</body>
</html>
